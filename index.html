<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quimica con Seneca - AR</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;900&display=swap" rel="stylesheet">

    <style>
      :root {
        color-scheme: dark;
        --bg: #020b08;
        --green: #a6ff4d;
        --green-bright: #6fff00;
        --green-soft: #d8ff8e;
        --text: #ffffff;
        --muted: #b6caba;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        font-family: "Rajdhani", sans-serif;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(1, 9, 8, 0.17), rgba(1, 10, 8, 0.58)),
          radial-gradient(circle at 50% 30%, rgba(132, 255, 70, 0.15), transparent 35rem),
          url("site-assets/img/backg.png") center top / cover no-repeat,
          var(--bg);
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
        padding: clamp(16px, 3.5vw, 36px) clamp(16px, 4vw, 32px) clamp(14px, 3vw, 28px);
      }

      header {
        position: relative;
        z-index: 2;
        max-width: 620px;
        margin: 0 auto;
        text-align: center;
      }

      .brand-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        margin-bottom: 12px;
      }

      .brand-logo {
        width: clamp(60px, 15vw, 85px);
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 0 12px rgba(111, 255, 0, 0.5));
      }

      h1 {
        margin: 0;
        font-size: clamp(2.3rem, 8.5vw, 3.8rem);
        font-weight: 700;
        line-height: 1.05;
        text-align: left;
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      }

      h1 span {
        display: block;
      }

      h1 .destacado {
        font-weight: 900;
        color: var(--green-bright);
        text-shadow: 0 0 20px rgba(111, 255, 0, 0.4);
      }

      p {
        max-width: 440px;
        margin: 8px auto 0;
        color: var(--muted);
        font-size: clamp(0.95rem, 3vw, 1.15rem);
        font-weight: 500;
        line-height: 1.35;
        text-wrap: balance;
        opacity: 0.9;
      }

      .viewer-wrap {
        width: 100%;
        height: min(50vh, 560px);
        align-self: center;
        margin: -34px 0 -22px;
      }

      #goat-viewer {
        display: block;
        width: 100%;
        height: 100%;
        cursor: grab;
        touch-action: none;
      }

      #goat-viewer:active {
        cursor: grabbing;
      }

      .ar-button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        width: min(90vw, 320px);
        min-height: 58px;
        margin: -18px auto 0;
        padding: 10px 24px;
        border: 2px solid #bdfc5d;
        border-radius: 999px;
        color: #041407;
        background: linear-gradient(180deg, #b0ff38, #5fc211);
        box-shadow:
          0 0 0 8px rgba(111, 255, 0, 0.15),
          0 10px 25px rgba(95, 194, 17, 0.4),
          inset 0 2px 2px rgba(255, 255, 255, 0.6);
        font-family: "Rajdhani", sans-serif;
        font-size: clamp(1.4rem, 5.5vw, 1.8rem);
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .ar-button:active {
        transform: scale(0.97);
      }

      .ar-button img {
        width: 32px;
        height: 32px;
        object-fit: contain;
      }

      .divider {
        width: 1px;
        height: 32px;
        background: rgba(4, 20, 7, 0.25);
      }

      footer {
        position: relative;
        z-index: 2;
        display: grid;
        justify-items: center;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
      }

      .hint {
        max-width: 80%;
        margin-top: 8px;
        color: #72aa74;
        font-size: 0.95rem;
        font-weight: 600;
        text-align: center;
      }

      @media (max-width: 560px) {
        .viewer-wrap {
          height: 48vh;
          margin: -48px 0 -34px;
        }

        .ar-button {
          margin-top: -28px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <div class="brand-container">
          <img src="site-assets/svg/ender.svg" class="brand-logo" alt="Logo de quimica" />
          <h1>
            <span>Quimica</span>
            <span class="destacado">con Seneca</span>
          </h1>
        </div>

        <p>
          Explora conceptos de quimica en realidad aumentada.
          Interactua con modelos y experimentos de forma dinamica.
        </p>
      </header>

      <div class="viewer-wrap" aria-label="Cabrita en vista 3D">
        <canvas id="goat-viewer"></canvas>
      </div>

      <button id="open-ar" class="ar-button" type="button">
        <img src="site-assets/svg/camera-ON.svg" alt="Icono camara" />
        <span class="divider" aria-hidden="true"></span>
        <span>Ver cabrita en AR</span>
      </button>

      <footer>
        <div id="status-text" class="hint">Toca el boton superior para abrir la experiencia 8th Wall.</div>
      </footer>
    </main>

    <script type="module" src="src/home-viewer.js"></script>
  </body>
</html>
