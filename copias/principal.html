<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Química con Séneca - AR</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;900&display=swap" rel="stylesheet">

    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
    </script>

    <style>
      :root {
        color-scheme: dark;
        --bg: #020b08;
        --green: #a6ff4d;
        --green-bright: #6fff00; /* Verde neón para resaltar palabras clave */
        --green-soft: #d8ff8e;
        --text: #ffffff;
        --muted: #b6caba; /* Color un poco más suave para el subtítulo pequeño */
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        font-family: 'Rajdhani', sans-serif;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(1, 9, 8, 0.174), rgba(1, 10, 8, 0.58)),
          radial-gradient(circle at 50% 30%, rgba(132, 255, 70, 0.15), transparent 35rem),
          url("Assets/img/backg.png") center top / cover no-repeat,
          var(--bg);
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
        padding: clamp(24px, 5vw, 48px) clamp(16px, 4vw, 32px);
      }

      header {
        position: relative;
        z-index: 2;
        text-align: center;
        max-width: 600px;
        margin: 0 auto;
      }

      /* Contenedor Flex para alinear el SVG y el Título lado a lado */
      .brand-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px; /* Espacio entre el matraz y el texto */
        margin-bottom: 12px;
      }

      .brand-logo {
        width: clamp(60px, 15vw, 85px); /* Tamaño responsivo para el SVG del matraz */
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 0 12px rgba(111, 255, 0, 0.5)); /* Efecto de brillo neón al SVG */
      }

      h1 {
        margin: 0;
        font-size: clamp(2.3rem, 8.5vw, 3.8rem);
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: 0.5px;
        text-align: left; /* Alineado a la izquierda respecto al logo */
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      }

      h1 span {
        display: block;
      }
      
      h1 .destacado {
        font-weight: 900;
        color: var(--green-bright);
        text-shadow: 0 0 20px rgba(111, 255, 0, 0.4);
      }

      /* Subtítulo más pequeño y estilizado */
      p {
        max-width: 440px;
        margin: 8px auto 0;
        color: var(--muted);
        font-size: clamp(0.95rem, 3vw, 1.15rem); /* Reducido para que se vea más fino */
        font-weight: 500;
        line-height: 1.35;
        text-wrap: balance;
        opacity: 0.9;
      }

      model-viewer {
        width: 100%;
        height: min(55vh, 600px);
        align-self: center;
        background: transparent;
        margin: 10px 0;
      }

      /* Botón Principal (Ver cabrita en AR) */
      .ar-button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        width: min(90vw, 320px);
        min-height: 58px;
        margin: 0 auto;
        padding: 10px 24px;
        border: 2px solid #bdfc5d;
        border-radius: 999px;
        color: #041407;
        background: linear-gradient(180deg, #b0ff38, #5fc211);
        box-shadow:
          0 0 0 8px rgba(111, 255, 0, 0.15),
          0 10px 25px rgba(95, 194, 17, 0.4),
          inset 0 2px 2px rgba(255, 255, 255, 0.6);
        font-family: 'Rajdhani', sans-serif;
        font-size: clamp(1.4rem, 5.5vw, 1.8rem);
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .ar-button:active {
        transform: scale(0.97);
      }

      .ar-button img {
        width: 32px;
        height: 32px;
        object-fit: contain;
      }

      .divider {
        width: 1px;
        height: 32px;
        background: rgba(4, 20, 7, 0.25);
      }

      .action-row {
        display: flex;
        justify-content: center;
        margin-top: 20px;
        margin-bottom: 10px;
      }

      /* Botón Inferior (Cambiar reactivo) */
      .eat-button {
        min-width: 260px;
        min-height: 52px;
        padding: 0 32px;
        border: 2px solid #52a11b;
        border-radius: 999px;
        color: #bdfc5d;
        background: linear-gradient(180deg, rgba(2, 20, 12, 0.85), rgba(1, 12, 7, 0.95));
        box-shadow:
          0 0 15px rgba(111, 255, 0, 0.25),
          inset 0 0 12px rgba(111, 255, 0, 0.15);
        font-family: 'Rajdhani', sans-serif;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .eat-button:active {
        transform: scale(0.98);
      }

      footer {
        position: relative;
        z-index: 2;
        display: grid;
        justify-items: center;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
      }

      .hint {
        margin-top: 10px;
        color: #72aa74;
        font-size: 0.95rem;
        font-weight: 600;
        text-align: center;
        max-width: 80%;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <div class="brand-container">
          <img src="Assets/svg/ender.svg" class="brand-logo" alt="Matraz Erlenmeyer Logo" />
          <h1>
            <span>Química</span> 
            <span class="destacado">con Séneca</span>
          </h1>
        </div>
        
        <p>
          Explora conceptos de química en realidad aumentada. 
          Interactúa con modelos y experimentos de forma dinámica.
        </p>
      </header>

      <model-viewer
        id="goat-viewer"
        src="Assets/cabritaS.glb"
        alt="Cabrita en realidad aumentada"
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-placement="floor"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1"
        interaction-prompt="auto">
        <button class="ar-button" slot="ar-button" type="button">
          <img src="Assets/svg/camera-ON.svg" alt="Icono Cámara">
          <span class="divider" aria-hidden="true"></span>
          <span>Ver cabrita en AR</span>
        </button>
      </model-viewer>

      <div class="action-row">
        <button id="change-color" class="eat-button" type="button">Cambiar reactivo</button>
      </div>

      <footer>
        <div id="status-text" class="hint">En Android compatible, toca el botón superior para iniciar la experiencia.</div>
      </footer>
    </main>

    <script type="module">
      const viewer = document.querySelector('#goat-viewer');
      const changeButton = document.querySelector('#change-color');
      const statusText = document.querySelector('#status-text');

      const colors = [
        [0, 1, 0.4, 1],
        [1, 0, 1, 1],
        [0, 0.8, 1, 1],
        [1, 1, 0, 1],
        [1, 0.4, 0, 1]
      ];

      let colorIndex = 0;

      const findLiquidMaterial = () => {
        if (!viewer.model) return null;

        return viewer.model.materials.find((material) => material.name === 'Material')
          || viewer.model.materials.find((material) => material.name === 'liquid')
          || viewer.model.materials.find((material) => material.name.toLowerCase().includes('liquid'))
          || viewer.model.materials[1];
      };

      changeButton.addEventListener('click', async () => {
        await viewer.updateComplete;

        const material = findLiquidMaterial();

        if (!material) {
          const names = viewer.model
            ? viewer.model.materials.map((item) => item.name).join(', ')
            : 'modelo no cargado';

          console.warn('No encontré el material de liquid. Materiales disponibles:', names);
          //statusText.textContent = 'No encontré el material líquido. Revisa la consola.';
          return;
        }

        colorIndex = (colorIndex + 1) % colors.length;
        material.pbrMetallicRoughness.setBaseColorFactor(colors[colorIndex]);
        //statusText.textContent = 'Color cambiado en ' + material.name + '.';
      });
    </script>
  </body>
</html>
